<mat-form-field appearance="fill" style="width: 100%;">
  <mat-label>Buscar ...</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Search..." [value]="filterValue">
</mat-form-field>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <ng-container *ngFor="let column of displayedColumns" [matColumnDef]="column">
    <th mat-header-cell *matHeaderCellDef> {{ column }} </th>
    <td mat-cell *matCellDef="let element"> {{ element[column] }} </td>
  </ng-container>

  <ng-container matColumnDef="actions" *ngIf="showActions">
    <th mat-header-cell *matHeaderCellDef> Acciones </th>
    <td mat-cell *matCellDef="let element">
      <button mat-icon-button (click)="onAction(element)" title="Ver detalles">
        <mat-icon>visibility</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="this.finishLabel"></tr>
  <tr mat-row *matRowDef="let row; columns: this.finishLabel;" [class.highlight-row]="row | rowHighlight"></tr>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" [attr.colspan]="this.finishLabel.length">
      No data matching "{{filterValue}}"
    </td>
  </tr>
</table>
